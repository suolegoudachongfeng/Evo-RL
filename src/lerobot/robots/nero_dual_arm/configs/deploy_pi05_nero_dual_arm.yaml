# NERO pi05 policy deployment config.
#
# Intended runtime:
# - Run the external NERO server from Le-nero on the robot/server machine.
# - Run this Evo-RL client config on the 5080 machine.
#
# Command:
#   cd /home/dc/Workspace/Evo-RL
#   conda activate wbcd
#   export PYTHONPATH=/home/dc/Workspace/Evo-RL/src
#   export HF_HUB_OFFLINE=1
#   python -m lerobot.scripts.lerobot_record \
#     --config_path=src/lerobot/robots/nero_dual_arm/configs/deploy_pi05_nero_dual_arm.yaml

robot:
  type: nero_dual_arm
  id: nero_dual_arm
  # Server-side PC running Le-nero's nero_interface_server.py.
  robot_ip: 192.168.110.41
  robot_port: 4242
  use_gripper: true
  gripper_max_open: 0.1
  gripper_force: 2.0
  gripper_reverse: false
  close_threshold: 0.05
  control_mode: oculus
  debug: false
  action_send_freq_hz: 50.0
  cameras:
    left_wrist_image:
      type: intelrealsense
      serial_number_or_name: "412622270929"
      width: 424
      height: 240
      fps: 30
      use_depth: false
    right_wrist_image:
      type: intelrealsense
      serial_number_or_name: "412622270701"
      width: 424
      height: 240
      fps: 30
      use_depth: false
    head_image:
      type: intelrealsense
      serial_number_or_name: "339322074423"
      width: 424
      height: 240
      fps: 30
      use_depth: false

# Policy-only deployment by default. If you want policy + Oculus human intervention,
# add a teleop block and set intervention_state_machine_enabled=true.
teleop: null

policy:
  type: pi05
  pretrained_path: /home/dc/Workspace/Evo-RL/checkpoints/pi05_nero_030000/pretrained_model
  device: cuda
  dtype: bfloat16
  push_to_hub: false

dataset:
  # lerobot-record is also the current real-robot policy execution entrypoint,
  # so a lightweight rollout dataset is created while the policy runs.
  repo_id: nero_task3_step1/2mL_empty_pi05_deploy
  single_task: "pick up small vials and place them in the empty rack"
  auto_version_repo_id: true
  root: null
  fps: 30
  episode_time_s: 60
  reset_time_s: 30
  num_episodes: 3
  video: true
  push_to_hub: false
  private: false
  tags: ["nero", "dual-arm", "pi05", "evorl", "deployment"]
  num_image_writer_processes: 0
  num_image_writer_threads_per_camera: 4
  video_encoding_batch_size: 1
  vcodec: libsvtav1
  rename_map: {}

display_data: true
display_ip: null
display_port: null
display_compressed_images: false
play_sounds: true
resume: false

policy_sync_to_teleop: false
policy_sync_parallel: true
intervention_state_machine_enabled: false
enable_episode_outcome_labeling: true
episode_success_key: s
episode_failure_key: f
require_episode_success_label: false
default_episode_success: null
enable_collector_policy_id: true
collector_policy_id_policy: pi05_nero_030000
collector_policy_id_human: human
communication_retry_timeout_s: 2.0
communication_retry_interval_s: 0.1

acp_inference:
  enable: true
  use_cfg: false
  cfg_beta: 1.0
