# Example recording config for a dual Franka + Robotiq setup.
# Start the external dual_franka_robotiq_rpc_server before running `lerobot-record`.

robot:
  type: franka_dual_arm
  id: franka_dual_arm
  robot_ip: 172.16.0.1
  robot_port: 4242
  rpc_timeout_sec: 30.0
  use_gripper: true
  gripper_max_open: 0.085
  gripper_force: 10.0
  gripper_speed: 0.1
  gripper_reverse: false
  close_threshold: 0.7
  open_grippers_on_connect: false
  reset_opens_grippers: true
  reset_go_home: true
  go_home_duration_sec: 5.0
  go_home_rate_hz: 50.0
  control_mode: oculus
  debug: false
  max_cartesian_delta: 0.06
  max_rotation_delta: 0.08
  cameras:
    left_wrist_image:
      type: intelrealsense
      serial_number_or_name: "412622270929"
      width: 424
      height: 240
      fps: 30
      use_depth: false
    right_wrist_image:
      type: intelrealsense
      serial_number_or_name: "412622270701"
      width: 424
      height: 240
      fps: 30
      use_depth: false
    head_image:
      type: intelrealsense
      serial_number_or_name: "339322074423"
      width: 424
      height: 240
      fps: 30
      use_depth: false

teleop:
  type: oculus_teleop
  id: quest_dual_franka
  ip: null
  use_gripper: true
  left_pose_scaler: [0.8, 0.8]
  right_pose_scaler: [0.8, 0.8]
  left_channel_signs: [1, 1, 1, -1, -1, 1]
  right_channel_signs: [1, 1, 1, -1, -1, 1]

dataset:
  repo_id: dual_franka/example_task
  single_task: "Dual Franka teleoperation task"
  auto_version_repo_id: true
  root: null
  fps: 30
  episode_time_s: 60
  reset_time_s: 30
  num_episodes: 5
  video: true
  push_to_hub: false
  private: false
  tags: ["franka", "dual-arm", "oculus"]
  num_image_writer_processes: 0
  num_image_writer_threads_per_camera: 4
  video_encoding_batch_size: 1
  vcodec: libsvtav1
  rename_map: {}

display_data: true
display_ip: null
display_port: null
display_compressed_images: false
play_sounds: true
resume: false

policy: null
policy_sync_to_teleop: false
policy_sync_parallel: true
intervention_state_machine_enabled: false
enable_episode_outcome_labeling: false
require_episode_success_label: false
default_episode_success: null
enable_collector_policy_id: false
collector_policy_id_policy: null
collector_policy_id_human: human
communication_retry_timeout_s: 2.0
communication_retry_interval_s: 0.1
